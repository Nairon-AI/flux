name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-release:
    # Skip version bump commits and release commits
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'release:') &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Get last release tag
        id: last_tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No previous release tag found"
          else
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Last release: $TAG"
          fi

      - name: Analyze commits since last release
        id: analyze
        run: |
          TAG="${{ steps.last_tag.outputs.tag }}"
          if [ -z "$TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since $TAG:"
          echo "$COMMITS"

          HAS_BREAKING=false
          HAS_FEAT=false
          HAS_FIX=false

          while IFS= read -r msg; do
            if echo "$msg" | grep -qiE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -qi 'BREAKING CHANGE'; then
              HAS_BREAKING=true
            elif echo "$msg" | grep -qiE '^feat(\(.+\))?:'; then
              HAS_FEAT=true
            elif echo "$msg" | grep -qiE '^fix(\(.+\))?:'; then
              HAS_FIX=true
            fi
          done <<< "$COMMITS"

          if $HAS_BREAKING; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
          elif $HAS_FEAT; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
          elif $HAS_FIX; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "No releasable commits (only docs/chore/ci)"
          fi

      - name: Compute next version
        if: steps.analyze.outputs.release_needed == 'true'
        id: version
        run: |
          TAG="${{ steps.last_tag.outputs.tag }}"
          BUMP="${{ steps.analyze.outputs.bump }}"
          CURRENT="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: v$NEXT ($BUMP bump)"

      - name: Build release notes
        if: steps.analyze.outputs.release_needed == 'true'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ steps.last_tag.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          if [ -z "$TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${TAG}..HEAD"
          fi

          # ── 1. Get merged PRs since last release (the source of truth) ──
          TAG_DATE=""
          if [ -n "$TAG" ]; then
            TAG_DATE=$(git log -1 --format=%aI "$TAG" 2>/dev/null || echo "")
          fi

          PR_JSON="[]"
          if [ -n "$TAG_DATE" ]; then
            PR_JSON=$(gh pr list --repo "$REPO" --state merged --base main \
              --search "merged:>=${TAG_DATE}" --limit 50 \
              --json number,title,body,labels \
              2>/dev/null || echo "[]")
          fi

          PR_COUNT=$(echo "$PR_JSON" | jq 'length')

          # ── 2. Classify PRs ──
          FEAT_PRS=""
          FIX_PRS=""
          DOC_PRS=""
          OTHER_PRS=""

          for i in $(seq 0 $((PR_COUNT - 1))); do
            PR_TITLE=$(echo "$PR_JSON" | jq -r ".[$i].title")
            PR_NUM=$(echo "$PR_JSON" | jq -r ".[$i].number")
            PR_BODY=$(echo "$PR_JSON" | jq -r ".[$i].body // \"\"")

            # Skip version bumps and CI noise
            echo "$PR_TITLE" | grep -qiE 'bump version|skip ci|^release:' && continue

            # Extract the "What this PR does" section from PR body as the description
            PR_DESC=""
            if [ -n "$PR_BODY" ]; then
              PR_DESC=$(echo "$PR_BODY" | sed -n '/## What this PR does/,/^## /{/^## What this PR does/d;/^## /d;p;}' | sed '/^$/d' | sed 's/<!-- .* -->//' | sed '/^$/d' | head -5)
            fi

            # Clean title — strip conventional commit prefix for display
            CLEAN_TITLE=$(echo "$PR_TITLE" | sed -E 's/^(feat|fix|docs|refactor|chore|ci|test|perf|style|build)(\([^)]*\))?[!]?:\s*//')

            # Build entry: title + description
            ENTRY="### ${CLEAN_TITLE} (#${PR_NUM})\n\n"
            if [ -n "$PR_DESC" ]; then
              ENTRY="${ENTRY}${PR_DESC}\n\n"
            fi

            # Classify by conventional commit prefix in PR title
            if echo "$PR_TITLE" | grep -qiE '^feat(\(.+\))?[!]?:'; then
              FEAT_PRS="${FEAT_PRS}${ENTRY}"
            elif echo "$PR_TITLE" | grep -qiE '^fix(\(.+\))?[!]?:'; then
              FIX_PRS="${FIX_PRS}${ENTRY}"
            elif echo "$PR_TITLE" | grep -qiE '^docs(\(.+\))?:'; then
              DOC_PRS="${DOC_PRS}${ENTRY}"
            else
              OTHER_PRS="${OTHER_PRS}${ENTRY}"
            fi
          done

          # ── 3. Fallback: if no PRs found, use commits ──
          if [ "$PR_COUNT" -eq 0 ] || [ -z "${FEAT_PRS}${FIX_PRS}${DOC_PRS}${OTHER_PRS}" ]; then
            SUBJECTS=$(git log "$RANGE" --pretty=format:"%s" | grep -v "chore: bump version" | grep -v "\[skip ci\]" | grep -v "^$" || true)

            while IFS= read -r msg; do
              [ -z "$msg" ] && continue
              CLEAN=$(echo "$msg" | sed -E 's/^(feat|fix|docs|refactor|chore|ci|test|perf|style|build)(\([^)]*\))?[!]?:\s*//')
              if echo "$msg" | grep -qiE '^feat(\(.+\))?:'; then
                FEAT_PRS="${FEAT_PRS}### ${CLEAN}\n\n"
              elif echo "$msg" | grep -qiE '^fix(\(.+\))?:'; then
                FIX_PRS="${FIX_PRS}### ${CLEAN}\n\n"
              elif echo "$msg" | grep -qiE '^docs(\(.+\))?:'; then
                DOC_PRS="${DOC_PRS}### ${CLEAN}\n\n"
              else
                OTHER_PRS="${OTHER_PRS}### ${CLEAN}\n\n"
              fi
            done <<< "$SUBJECTS"
          fi

          # ── 4. Assemble release notes ──
          BODY="## What's New\n\n"

          if [ -n "$FEAT_PRS" ]; then
            BODY="${BODY}${FEAT_PRS}"
          fi

          if [ -n "$FIX_PRS" ]; then
            BODY="${BODY}---\n\n## Bug Fixes\n\n${FIX_PRS}"
          fi

          if [ -n "$DOC_PRS" ]; then
            BODY="${BODY}---\n\n## Documentation\n\n${DOC_PRS}"
          fi

          if [ -n "$OTHER_PRS" ]; then
            BODY="${BODY}---\n\n## Other\n\n${OTHER_PRS}"
          fi

          # ── 5. PR list ──
          BODY="${BODY}---\n\n## PRs\n\n"
          for i in $(seq 0 $((PR_COUNT - 1))); do
            PR_TITLE=$(echo "$PR_JSON" | jq -r ".[$i].title")
            PR_NUM=$(echo "$PR_JSON" | jq -r ".[$i].number")
            echo "$PR_TITLE" | grep -qiE 'bump version|skip ci|^release:' && continue
            BODY="${BODY}- #${PR_NUM} — ${PR_TITLE}\n"
          done

          if [ -n "$TAG" ]; then
            BODY="${BODY}\n## Full Changelog\n\nhttps://github.com/${REPO}/compare/${TAG}...v${VERSION}\n"
          fi

          # Write notes
          echo -e "$BODY" > /tmp/release-notes.md

          # ── 6. Generate title from primary feature PR ──
          TITLE="v${VERSION}"
          FIRST_FEAT_TITLE=$(echo "$PR_JSON" | jq -r '[.[] | select(.title | test("^feat"; "i"))][0].title // ""')
          if [ -n "$FIRST_FEAT_TITLE" ] && [ "$FIRST_FEAT_TITLE" != "" ]; then
            SHORT=$(echo "$FIRST_FEAT_TITLE" | sed -E 's/^feat(\([^)]*\))?[!]?:\s*//' | cut -c1-60)
            SHORT=$(echo "$SHORT" | sed 's/^./\U&/')
            TITLE="v${VERSION} — ${SHORT}"
          fi
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        if: steps.analyze.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Tag current HEAD on main
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          # Create GitHub release with structured summary
          gh release create "v${VERSION}" \
            --target main \
            --title "${{ steps.notes.outputs.title }}" \
            --notes-file /tmp/release-notes.md

          echo "Released v${VERSION}"
          echo "post-release-bump.yml will auto-bump manifests to next -dev version"
