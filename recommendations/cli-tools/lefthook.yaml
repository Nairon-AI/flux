name: lefthook
category: cli-tool
tagline: Fast git hooks manager - catch errors before CI
sdlc_phase: review
solves: No git hooks to catch lint/test failures locally before push
tags: [git, hooks, ci, pre-commit]
source: manual
source_url: https://github.com/evilmartians/lefthook
pricing:
  model: free
  details: Free and open source
install:
  type: cli
  command: brew install lefthook && lefthook install
  verify: lefthook --version
